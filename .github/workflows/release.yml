name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore wt-agent.sln

      - name: Test
        run: dotnet test wt-agent.sln --configuration Release --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish src/WtAgent/WtAgent.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          --output out/win-x64

      - name: Package artifact
        shell: pwsh
        run: |
          $artifactName = "wt-agent-win-x64.zip"
          if (Test-Path $artifactName) {
            Remove-Item $artifactName -Force
          }
          Compress-Archive -Path "out/win-x64/*" -DestinationPath $artifactName

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: wt-agent-win-x64.zip
