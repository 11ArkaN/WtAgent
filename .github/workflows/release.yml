name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore wt-agent.sln

      - name: Test
        run: dotnet test wt-agent.sln --configuration Release --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish src/WtAgent/WtAgent.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:DebugType=None
          /p:DebugSymbols=false
          --output out/win-x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build setup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          & $iscc `
            "/DMyAppVersion=$tag" `
            "/DAppSourceDir=$PWD\out\win-x64" `
            "/DSkillSourceDir=$PWD\skills\wt-agent-terminal" `
            "$PWD\installer\WtAgent.iss"

      - name: Package artifact
        shell: pwsh
        run: |
          $artifactName = "wt-agent-win-x64.zip"
          if (Test-Path $artifactName) {
            Remove-Item $artifactName -Force
          }
          Compress-Archive -Path "out/win-x64/*" -DestinationPath $artifactName

      - name: Package skill
        shell: pwsh
        run: |
          $artifactName = "wt-agent-terminal-skill.zip"
          if (Test-Path $artifactName) {
            Remove-Item $artifactName -Force
          }
          Compress-Archive -Path "skills/wt-agent-terminal" -DestinationPath $artifactName

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/WtAgent-Setup.exe
            wt-agent-win-x64.zip
            wt-agent-terminal-skill.zip
